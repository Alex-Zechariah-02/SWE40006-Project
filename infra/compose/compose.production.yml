name: balance-production

services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-Balance}
      PRODUCT_NAME: ${PRODUCT_NAME:-Balance}
      PROJECT_SLUG: ${PROJECT_SLUG:-balance}
      DEPLOYMENT_NAMESPACE: ${DEPLOYMENT_NAMESPACE:-swe40006-project}
      APP_ENV: production
      NODE_ENV: ${NODE_ENV:-production}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      GIT_COMMIT: ${GIT_COMMIT:-production}
      BUILD_ID: ${BUILD_ID:-production-build}
      API_PORT: 3001
    expose:
      - '3001'
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        API_BASE_PATH: ${API_BASE_PATH:-/api}
        API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:3001}
        NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/api}
    depends_on:
      - api
    environment:
      APP_NAME: ${APP_NAME:-Balance}
      PRODUCT_NAME: ${PRODUCT_NAME:-Balance}
      PROJECT_SLUG: ${PROJECT_SLUG:-balance}
      DEPLOYMENT_NAMESPACE: ${DEPLOYMENT_NAMESPACE:-swe40006-project}
      APP_ENV: production
      NODE_ENV: ${NODE_ENV:-production}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      GIT_COMMIT: ${GIT_COMMIT:-production}
      BUILD_ID: ${BUILD_ID:-production-build}
      WEB_PORT: 3000
      API_PORT: 3001
      PUBLIC_HTTP_PORT: ${PUBLIC_HTTP_PORT:-80}
      API_BASE_URL: ${API_BASE_URL:-http://api:3001}
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:3001}
      API_BASE_PATH: ${API_BASE_PATH:-/api}
      API_HEALTH_PATH: ${API_HEALTH_PATH:-/api/health}
      API_VERSION_PATH: ${API_VERSION_PATH:-/api/version}
      NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/api}
      NEXT_PUBLIC_API_HEALTH_PATH: ${NEXT_PUBLIC_API_HEALTH_PATH:-/api/health}
      NEXT_PUBLIC_API_VERSION_PATH: ${NEXT_PUBLIC_API_VERSION_PATH:-/api/version}
    ports:
      - '80:3000'
    restart: unless-stopped

  # ── Level 2: Observability ─────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.5.2
    container_name: balance-prometheus
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    # Allows Prometheus to reach node_exporter running as a host service.
    # host-gateway resolves to the Docker bridge IP on Linux EC2.
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      # Bound to loopback only — not publicly accessible.
      - '127.0.0.1:9090:9090'
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:13.0.1
    container_name: balance-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
      - ../monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards-json:ro
    ports:
      # Port 3000 is taken by the web app, so Grafana uses 3002.
      # Temporarily open TCP 3002 to your IP in the AWS security group for evidence screenshots.
      # Remove the rule immediately after.
      - '3002:3000'
    depends_on:
      - prometheus
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: balance-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    # Internal only — Prometheus scrapes cadvisor:8080 on the Docker network.
    # Not published to the host or the internet.
    expose:
      - '8080'
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
