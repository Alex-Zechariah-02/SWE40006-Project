name: balance-staging

services:
  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-balance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-balance}
      POSTGRES_DB: ${POSTGRES_DB:-balance}
    volumes:
      # Postgres 18+ stores data under a version-specific PGDATA beneath /var/lib/postgresql.
      # Mount at /var/lib/postgresql so major upgrades can use pg_upgrade --link.
      - postgres-data:/var/lib/postgresql
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:8.4.2
    command: ['redis-server', '--save', '']
    expose:
      - '6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    environment:
      APP_ENV: staging
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      QUEUE_PROOF_NAME: ${QUEUE_PROOF_NAME:-queue_proof}
      EXTRACTION_QUEUE_NAME: ${EXTRACTION_QUEUE_NAME:-document_extract}
      DATABASE_URL: ${DATABASE_URL:-postgresql://balance:balance@postgres:5432/balance?schema=public}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
      S3_REGION: ${S3_REGION:-${AWS_REGION:?AWS_REGION is required}}
      OCR_PROVIDER: ${OCR_PROVIDER:-tesseract}
      TESSERACT_LANG: ${TESSERACT_LANG:-eng}
      AWS_REGION: ${AWS_REGION:?AWS_REGION is required}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    expose:
      - '8000'
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8000/health']
      interval: 10s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-Balance}
      PRODUCT_NAME: ${PRODUCT_NAME:-Balance}
      PROJECT_SLUG: ${PROJECT_SLUG:-balance}
      DEPLOYMENT_NAMESPACE: ${DEPLOYMENT_NAMESPACE:-swe40006-project}
      APP_ENV: staging
      NODE_ENV: ${NODE_ENV:-production}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      GIT_COMMIT: ${GIT_COMMIT:-staging}
      BUILD_ID: ${BUILD_ID:-staging-build}
      API_PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgresql://balance:balance@postgres:5432/balance?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      EXTRACTION_QUEUE_NAME: ${EXTRACTION_QUEUE_NAME:-document_extract}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
      S3_REGION: ${S3_REGION:-${AWS_REGION:?AWS_REGION is required}}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:-}
      AWS_REGION: ${AWS_REGION:?AWS_REGION is required}
    expose:
      - '3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        API_BASE_PATH: ${API_BASE_PATH:-/api}
        API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:3001}
        NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/api}
    depends_on:
      - api
    environment:
      APP_NAME: ${APP_NAME:-Balance}
      PRODUCT_NAME: ${PRODUCT_NAME:-Balance}
      PROJECT_SLUG: ${PROJECT_SLUG:-balance}
      DEPLOYMENT_NAMESPACE: ${DEPLOYMENT_NAMESPACE:-swe40006-project}
      APP_ENV: staging
      NODE_ENV: ${NODE_ENV:-production}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      GIT_COMMIT: ${GIT_COMMIT:-staging}
      BUILD_ID: ${BUILD_ID:-staging-build}
      WEB_PORT: 3000
      API_PORT: 3001
      PUBLIC_HTTP_PORT: ${PUBLIC_HTTP_PORT:-80}
      API_BASE_URL: ${API_BASE_URL:-http://api:3001}
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:3001}
      API_BASE_PATH: ${API_BASE_PATH:-/api}
      API_HEALTH_PATH: ${API_HEALTH_PATH:-/api/health}
      API_VERSION_PATH: ${API_VERSION_PATH:-/api/version}
      NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/api}
      NEXT_PUBLIC_API_HEALTH_PATH: ${NEXT_PUBLIC_API_HEALTH_PATH:-/api/health}
      NEXT_PUBLIC_API_VERSION_PATH: ${NEXT_PUBLIC_API_VERSION_PATH:-/api/version}
    ports:
      - '80:3000'
    restart: unless-stopped

  # ── Level 2: Observability ─────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.5.2
    container_name: balance-prometheus
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    # Allows Prometheus to reach node_exporter running as a host service.
    # host-gateway resolves to the Docker bridge IP on Linux EC2.
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      # Bound to loopback only — not publicly accessible.
      - '127.0.0.1:9090:9090'
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:13.0.1
    container_name: balance-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
      - ../monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards-json:ro
    ports:
      # Port 3000 is taken by the web app, so Grafana uses 3002.
      - '3002:3000'
    depends_on:
      - prometheus
    restart: unless-stopped

  cadvisor:
    image: ghcr.io/google/cadvisor:0.56.2
    container_name: balance-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    # Internal only — Prometheus scrapes cadvisor:8080 on the Docker network.
    # Not published to the host or the internet.
    expose:
      - '8080'
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  postgres-data:
