name: balance-local

services:
  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-balance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-balance}
      POSTGRES_DB: ${POSTGRES_DB:-balance}
    volumes:
      # Postgres 18+ uses a version-specific PGDATA under /var/lib/postgresql.
      # Mount at /var/lib/postgresql (not /var/lib/postgresql/data) to preserve data correctly.
      - postgres18-data-v18:/var/lib/postgresql
    ports:
      - target: 5432
        published: 5433
        protocol: tcp
        mode: host
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:8.4.2
    command: ['redis-server', '--save', '']
    ports:
      - target: 6379
        published: 6379
        protocol: tcp
        mode: host
    expose:
      - '6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    environment:
      APP_ENV: local
      # Always use Compose service names inside containers.
      # Host-side .env commonly sets REDIS_URL=redis://localhost:6379, which would break inside Docker.
      REDIS_URL: redis://redis:6379
      QUEUE_PROOF_NAME: ${QUEUE_PROOF_NAME:-queue_proof}
      EXTRACTION_QUEUE_NAME: ${EXTRACTION_QUEUE_NAME:-document_extract}
      DATABASE_URL: postgresql://balance:balance@postgres:5432/balance?schema=public
      STORAGE_DRIVER: ${STORAGE_DRIVER:-filesystem}
      # Hardcoded to /data/balance-storage because this runs inside a Linux container.
      # The host .env may contain a Windows absolute path (e.g. C:/Users/...) that does not exist inside Docker.
      STORAGE_FILESYSTEM_ROOT: /data/balance-storage
      # AWS credentials/region are required only when using STORAGE_DRIVER=s3 or OCR_PROVIDER=textract.
      # Recommended local auth: mount your host AWS config/credentials directory into /root/.aws (see volumes below)
      # and set AWS_PROFILE (optional) + AWS_REGION/S3_REGION as needed.
      AWS_REGION: ${AWS_REGION:-}
      AWS_PROFILE: ${AWS_PROFILE:-default}
      # AWS credential env vars are injected by up-worker-aws.ps1 via
      # Set-AwsEnvFromCliLogin before docker compose up runs.  They are
      # necessary because boto3 cannot natively resolve the AWS CLI
      # login_session used by this profile, and the slim Python image
      # does not include the aws CLI binary.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_SDK_LOAD_CONFIG: ${AWS_SDK_LOAD_CONFIG:-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      OCR_PROVIDER: ${OCR_PROVIDER:-textract}
      TESSERACT_LANG: ${TESSERACT_LANG:-eng}
      TESSERACT_OEM: ${TESSERACT_OEM:-1}
      TESSERACT_PSM: ${TESSERACT_PSM:-6}
      PDF_OCR_DPI: ${PDF_OCR_DPI:-300}
      TEXTRACT_PDF_TIMEOUT_SECONDS: ${TEXTRACT_PDF_TIMEOUT_SECONDS:-120}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    expose:
      - '8000'
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8000/health']
      interval: 10s
      timeout: 3s
      retries: 20
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      # Mount Python app source code so extraction code changes take effect
      # without a Docker rebuild — the bind mount overlays the image's COPY layer.
      - type: bind
        source: services/worker/app
        target: /worker/app
      - type: bind
        source: ${BALANCE_STORAGE_HOST_PATH:-tmp/balance-storage}
        target: /data/balance-storage
    restart: unless-stopped

  # Note on relative paths in bind-mounts:
  # Docker Compose with --project-directory . resolves ${BALANCE_STORAGE_HOST_PATH:-tmp/balance-storage}
  # relative to the project directory (repo root). That is correct: <root>/tmp/balance-storage.
  # Do NOT use ../../tmp/balance-storage here — that goes up from the project directory, not
  # from the compose file's directory, producing a completely wrong host path on Windows.

  worker-aws:
    profiles: ['aws']
    extends:
      service: worker
    volumes:
      # Mount Python app source code (inherited from worker, but must be
      # restated here because extends replaces volume lists instead of appending).
      - type: bind
        source: services/worker/app
        target: /worker/app
      - type: bind
        source: ${BALANCE_STORAGE_HOST_PATH:-tmp/balance-storage}
        target: /data/balance-storage
      # Mount host AWS config/credentials for boto3.
      # Set AWS_CONFIG_HOST_PATH if your creds are not at the default location.
      - type: bind
        source: ${AWS_CONFIG_HOST_PATH:-${USERPROFILE}/.aws}
        target: /root/.aws
        read_only: true

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-Balance}
      PRODUCT_NAME: ${PRODUCT_NAME:-Balance}
      PROJECT_SLUG: ${PROJECT_SLUG:-balance}
      DEPLOYMENT_NAMESPACE: ${DEPLOYMENT_NAMESPACE:-swe40006-project}
      APP_ENV: local
      NODE_ENV: ${NODE_ENV:-development}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      GIT_COMMIT: ${GIT_COMMIT:-local}
      BUILD_ID: ${BUILD_ID:-local-build}
      API_PORT: 3001
      DATABASE_URL: postgresql://balance:balance@postgres:5432/balance?schema=public
      REDIS_URL: redis://redis:6379
      STORAGE_DRIVER: ${STORAGE_DRIVER:-filesystem}
      # Hardcoded to /data/balance-storage (same reason as worker — host Windows path is meaningless inside Docker).
      STORAGE_FILESYSTEM_ROOT: /data/balance-storage
      EXTRACTION_PROVIDER_DEFAULT: ${EXTRACTION_PROVIDER_DEFAULT:-textract}
      AWS_REGION: ${AWS_REGION:-}
      AWS_PROFILE: ${AWS_PROFILE:-default}
      # AWS credential env vars — same reason as worker service (login_session
      # requires the AWS CLI binary, which is not in the slim image).
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_SDK_LOAD_CONFIG: ${AWS_SDK_LOAD_CONFIG:-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      JWT_SECRET: ${JWT_SECRET:-replace-this-local-only}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:-replace-this-local-only}
    expose:
      - '3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - type: bind
        source: ${BALANCE_STORAGE_HOST_PATH:-tmp/balance-storage}
        target: /data/balance-storage
    restart: unless-stopped

  api-aws:
    profiles: ['aws']
    extends:
      service: api
    volumes:
      - type: bind
        source: ${BALANCE_STORAGE_HOST_PATH:-tmp/balance-storage}
        target: /data/balance-storage
      - type: bind
        source: ${AWS_CONFIG_HOST_PATH:-${USERPROFILE}/.aws}
        target: /root/.aws
        read_only: true

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        API_BASE_PATH: ${API_BASE_PATH:-/api}
        API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:3001}
        NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/api}
    depends_on:
      - api
    environment:
      APP_NAME: ${APP_NAME:-Balance}
      PRODUCT_NAME: ${PRODUCT_NAME:-Balance}
      PROJECT_SLUG: ${PROJECT_SLUG:-balance}
      DEPLOYMENT_NAMESPACE: ${DEPLOYMENT_NAMESPACE:-swe40006-project}
      APP_ENV: local
      NODE_ENV: ${NODE_ENV:-development}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      GIT_COMMIT: ${GIT_COMMIT:-local}
      BUILD_ID: ${BUILD_ID:-local-build}
      WEB_PORT: 3000
      API_PORT: 3001
      PUBLIC_HTTP_PORT: ${PUBLIC_HTTP_PORT:-3000}
      API_BASE_URL: ${API_BASE_URL:-http://api:3001}
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:3001}
      API_BASE_PATH: ${API_BASE_PATH:-/api}
      API_HEALTH_PATH: ${API_HEALTH_PATH:-/api/health}
      API_VERSION_PATH: ${API_VERSION_PATH:-/api/version}
      NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/api}
      NEXT_PUBLIC_API_HEALTH_PATH: ${NEXT_PUBLIC_API_HEALTH_PATH:-/api/health}
      NEXT_PUBLIC_API_VERSION_PATH: ${NEXT_PUBLIC_API_VERSION_PATH:-/api/version}
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        mode: host
    restart: unless-stopped

volumes:
  postgres18-data-v18:
