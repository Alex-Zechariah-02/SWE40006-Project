name: balance-ci-proof

services:
  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-balance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-balance}
      POSTGRES_DB: ${POSTGRES_DB:-balance}
    volumes:
      # Postgres 18+ uses a version-specific PGDATA under /var/lib/postgresql.
      # Mount at /var/lib/postgresql (not /var/lib/postgresql/data) to preserve data correctly.
      - postgres18-data-v18:/var/lib/postgresql
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:8.4.2
    command: ['redis-server', '--save', '']
    expose:
      - '6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    environment:
      APP_ENV: local
      # Always use Compose service names inside containers.
      # Host-side .env commonly sets REDIS_URL=redis://localhost:6379, which would break inside Docker.
      REDIS_URL: redis://redis:6379
      QUEUE_PROOF_NAME: ${QUEUE_PROOF_NAME:-queue_proof}
      EXTRACTION_QUEUE_NAME: ${EXTRACTION_QUEUE_NAME:-document_extract}
      DATABASE_URL: ${DATABASE_URL:-postgresql://balance:balance@postgres:5432/balance?schema=public}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-filesystem}
      # Hardcoded to /data/balance-storage because this runs inside a Linux container.
      # The host .env may contain a Windows absolute path (e.g. C:/Users/...) that does not exist inside Docker.
      STORAGE_FILESYSTEM_ROOT: /data/balance-storage
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      # Prefer explicit environment credentials in CI; do not force profile loading.
      AWS_SDK_LOAD_CONFIG: ${AWS_SDK_LOAD_CONFIG:-0}
      AWS_EC2_METADATA_DISABLED: ${AWS_EC2_METADATA_DISABLED:-true}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      OCR_PROVIDER: ${OCR_PROVIDER:-textract}
      TESSERACT_LANG: ${TESSERACT_LANG:-eng}
      TESSERACT_OEM: ${TESSERACT_OEM:-1}
      TESSERACT_PSM: ${TESSERACT_PSM:-6}
      PDF_OCR_DPI: ${PDF_OCR_DPI:-300}
      TEXTRACT_PDF_TIMEOUT_SECONDS: ${TEXTRACT_PDF_TIMEOUT_SECONDS:-120}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    expose:
      - '8000'
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8000/health']
      interval: 10s
      timeout: 3s
      retries: 20
    volumes:
      # CI proof stacks run from the baked image (no live bind mount).
      # A relative bind mount here would be resolved relative to this compose file
      # directory (`infra/compose`), which breaks the worker import path and causes:
      # "Could not import module app.main".
      - type: bind
        source: ${BALANCE_STORAGE_HOST_PATH:-tmp/balance-storage}
        target: /data/balance-storage
    # In CI proofs we prefer failing fast (and keeping logs) over restart loops.
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-Balance}
      PRODUCT_NAME: ${PRODUCT_NAME:-Balance}
      PROJECT_SLUG: ${PROJECT_SLUG:-balance}
      DEPLOYMENT_NAMESPACE: ${DEPLOYMENT_NAMESPACE:-swe40006-project}
      APP_ENV: local
      NODE_ENV: ${NODE_ENV:-development}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      GIT_COMMIT: ${GIT_COMMIT:-local}
      BUILD_ID: ${BUILD_ID:-local-build}
      API_PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgresql://balance:balance@postgres:5432/balance?schema=public}
      REDIS_URL: redis://redis:6379
      STORAGE_DRIVER: ${STORAGE_DRIVER:-filesystem}
      STORAGE_FILESYSTEM_ROOT: /data/balance-storage
      EXTRACTION_PROVIDER_DEFAULT: ${EXTRACTION_PROVIDER_DEFAULT:-textract}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      # Prefer explicit environment credentials in CI; do not force profile loading.
      AWS_SDK_LOAD_CONFIG: ${AWS_SDK_LOAD_CONFIG:-0}
      AWS_EC2_METADATA_DISABLED: ${AWS_EC2_METADATA_DISABLED:-true}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      JWT_SECRET: ${JWT_SECRET:-replace-this-local-only}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:-replace-this-local-only}
    expose:
      - '3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - type: bind
        source: ${BALANCE_STORAGE_HOST_PATH:-tmp/balance-storage}
        target: /data/balance-storage
    # In CI proofs we prefer failing fast (and keeping logs) over restart loops.
    restart: "no"

volumes:
  postgres18-data-v18:
